services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "onetouch_audit"
      CORS_ORIGINS: "*"
      JWT_SECRET: "onetouch-audit-ai-super-secret-jwt-key-2026"
      ENABLE_PHASE2: "true"
      EMERGENT_LLM_KEY: ""
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web:
    image: node:20-alpine
    working_dir: /app
    environment:
      # CRA dev server port
      PORT: "5175"
      # In dev mode, call API directly
      REACT_APP_BACKEND_URL: "http://localhost:8000"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/frontend:/app
    command: ["sh", "-lc", "corepack enable && yarn install --frozen-lockfile --network-timeout 600000 && yarn start"]
    ports:
      - "5175:5175"
    depends_on:
      - api

volumes:
  mongo_data:

